<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc nghiệm</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .question { margin-bottom: 20px; border: 1px solid #ddd; padding: 15px; border-radius: 5px; }
        .question h3 { color: #333; }
        .options { list-style: none; padding: 0; }
        .options li { margin-bottom: 5px; }
        .options input[type="radio"] { margin-right: 10px; }
        .options li.correct { background-color: #d4edda; color: #155724; padding: 5px; border-radius: 3px; }
        .options li.incorrect { background-color: #f8d7da; color: #721c24; padding: 5px; border-radius: 3px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px; }
        button:hover { background: #0056b3; }
        #result { margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 5px; display: none; }
        .feedback { font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Trắc nghiệm</h1>
    <p>Tổng cộng: 125 câu. Chọn đáp án cho mỗi câu để xem kết quả ngay lập tức (màu xanh: đúng, màu đỏ: sai).</p>
    <form id="quizForm">
        <div id="questions"></div>
        <button type="button" onclick="submitQuiz()">Nộp bài để xem tổng điểm</button>
    </form>
    <div id="result"></div>

    <script>
        const questions = [
{ q: "Câu 1: Chủ nghĩa Mác-Lênin là hệ tư tưởng của giai cấp nào?", options: ["a. Nhân dân lao động","b. Tầng lớp tri thức","c. Giai cấp công nhân","d. Giai cấp nông dân"], answer: "c" },
{ q: "Câu 2: Giai cấp công nhân thông qua con đường nào để giải phóng mình?", options: ["a. Biểu tình, bãi công","b. Đấu tranh nghị viện","c. Cách mạng xã hội chủ nghĩa","d. Đấu tranh kinh tế"], answer: "c" },
{ q: "Câu 3: Nhiệm vụ cơ bản đầu tiên của cách mạng xã hội chủ nghĩa là gì?", options: ["a. Giai cấp công nhân giành lấy chính quyền","b. Xây dựng và hoàn thiện chính quyền nhà nước","c. Phát triển lực lượng sản xuất","d. Cả a, b, c đều đúng"], answer: "a" },
{ q: "Câu 4: Giai cấp công nhân là người lao động gắn với nền sản xuất:", options: ["a. Nông nghiệp","b. Thủ công nghiệp","c. Đại công nghiệp","d. Công - nông nghiệp"], answer: "c" },
{ q: "Câu 5: Học thuyết Mác-Lênin làm sáng tỏ vai trò của lực lượng nào?", options: ["a. Giai cấp tư sản","b. Giai cấp công nhân","c. Giai cấp nông dân","d. Tầng lớp tri thức"], answer: "b" },
{ q: "Câu 6:", options: ["a. Nhận thức về chính trị - xã hội","b. Kỹ năng nghiên cứu khoa học","c. Niềm tin vào lý tưởng cách mạng","d. Cả a, b, c đều đúng"], answer: "d" },
{ q: "Câu 7:", options: ["a. Kinh tế - xã hội","b. Khoa học tự nhiên","c. Tư tưởng lý luận","d. Cả a, b, c đều đúng"], answer: "d" },
{ q: "Câu 8:", options: ["a. Chủ nghĩa duy vật lịch sử","b. Giá trị thặng dư","c. Sứ mệnh công nhân","d. Cả a, b, c đều đúng"], answer: "d" },
{ q: "Câu 9:", options: ["a. Sứ mệnh công nhân","b. Thay thế CNTB","c. Con đường CNXH","d. Cả a, b, c đều đúng"], answer: "d" },
{ q: "Câu 10:", options: ["a. Duy vật biện chứng","b. Logic + lịch sử","c. Khảo sát xã hội","d. Cả a, b, c đều đúng"], answer: "d" },

{ q: "Câu 11:", options: ["a. Sứ mệnh công nhân","b. Giá trị lao động","c. Giá trị tiền công","d. Mâu thuẫn giai cấp"], answer: "d" },
{ q: "Câu 12:", options: ["a. Lao động trực tiếp","b. Giai cấp công nhân","c. Lao động tri thức","d. Lao động kỹ thuật"], answer: "b" },
{ q: "Câu 13:", options: ["a. Sức lao động","b. Cổ phiếu ít","c. Không phân phối","d. Không có TLSX"], answer: "d" },
{ q: "Câu 14:", options: ["a. Làm tăng tư bản","b. Tay nghề","c. Tổ chức","d. Kỹ thuật"], answer: "a" },
{ q: "Câu 15:", options: ["a. TLSX","b. Hầu hết TLSX","c. TLSX chủ yếu","d. Tất cả sản phẩm"], answer: "c" },
{ q: "Câu 16:", options: ["a. Số lượng ít","b. Tổ chức thấp","c. Kỷ luật thấp","d. Lao động cơ khí"], answer: "d" },
{ q: "Câu 17:", options: ["a. Tư bản lớn","b. Trung lưu","c. Lao động","d. Tư bản nhỏ"], answer: "a" },
{ q: "Câu 18:", options: ["a. Tri thức","b. Công nhân","c. Công - nông","d. Các nước XHCN"], answer: "b" },
{ q: "Câu 19:", options: ["a. Xóa chế độ cũ","b. Xóa giai cấp","c. Xóa QHSX","d. Xây dựng CNXH"], answer: "d" },
{ q: "Câu 20:", options: ["a. Nông dân","b. Dân nghèo","c. Công nhân","d. Công - nông"], answer: "c" },

{ q: "Câu 21:", options: ["a. Lao động cao","b. Kỷ luật","c. Lợi ích thống nhất","d. Kỹ thuật"], answer: "c" },
{ q: "Câu 22:", options: ["a. Đoàn kết","b. Kỹ thuật","c. Bị bóc lột","d. SX tiên tiến"], answer: "d" },
{ q: "Câu 23:", options: ["a. Triệt để","b. Không tư hữu","c. Đoàn kết","d. Kỷ luật"], answer: "b" },
{ q: "Câu 24:", options: ["a. Bình đẳng","b. Tất cả bình đẳng","c. Nhiều bình đẳng","d. Văn hoá"], answer: "a" },
{ q: "Câu 25:", options: ["a. Tự do","b. Tự quyết","c. Độc lập","d. Quyết định"], answer: "b" },
{ q: "Câu 26:", options: ["a. Nông dân","b. Nhân dân thế giới","c. Các dân tộc","d. Người lao động"], answer: "d" },
{ q: "Câu 27:", options: ["a. Bế tắc","b. Hoàn toàn bất lực","c. Lo lắng","d. Phụ thuộc"], answer: "a" },
{ q: "Câu 28:", options: ["a. Kinh tế","b. Nhận thức","c. Tâm lý","d. Văn hoá"], answer: "b" },
{ q: "Câu 29:", options: ["a. Công - nông","b. Nhân dân","c. Tri thức","d. Lao động"], answer: "b" },
{ q: "Câu 30:", options: ["a. Mỹ","b. Anh","c. Pháp","d. Tháng Mười Nga"], answer: "d" },

{ q: "Câu 31:", options: ["a. Dân tộc","b. Đạo đức","c. Quốc tế","d. Đa dạng"], answer: "a" },
{ q: "Câu 32:", options: ["a. Đảng","b. Đảng & Nhà nước","c. Nhà nước","d. Hệ thống chính trị"], answer: "b" },
{ q: "Câu 33:", options: ["a. Nguyên tắc","b. Ưu tiên","c. Phải thực hiện","d. Cần thiết"], answer: "a" },
{ q: "Câu 34:", options: ["a. 56","b. 54","c. 50","d. 52"], answer: "b" },
{ q: "Câu 35:", options: ["a. Tư sản - nông dân","b. Tư sản - tri thức","c. Tư sản - vô sản","d. Tư sản - lao động"], answer: "c" },
{ q: "Câu 36:", options: ["a. Công - nông","b. Nông dân","c. Công nhân","d. Tri thức"], answer: "c" },
{ q: "Câu 37:", options: ["a. Tri thức","b. Công - nông","c. Nông dân","d. Công nhân"], answer: "d" },
{ q: "Câu 38:", options: ["a. Tự nguyện","b. Một vợ một chồng","c. Chỉ pháp lý","d. Bình đẳng"], answer: "c" }
            
        ];

        let html = '';
        questions.forEach((item, index) => {
            html += `<div class="question">
                <h3>${item.q}</h3>
                <ul class="options" id="options-${index}">`;
            item.options.forEach((opt, i) => {
                const value = String.fromCharCode(97 + i);
                html += `<li id="li-${index}-${value}"><input type="radio" name="q${index}" value="${value}" id="q${index}_${value}"> ${opt}</li>`;
            });
            html += `</ul>
            </div>`;
        });
        document.getElementById('questions').innerHTML = html;

        // Thêm event listener cho mỗi radio button
        questions.forEach((item, index) => {
            const radios = document.querySelectorAll(`input[name="q${index}"]`);
            radios.forEach(radio => {
                radio.addEventListener('change', function() {
                    const selectedValue = this.value;
                    const optionList = document.getElementById(`options-${index}`);
                    optionList.querySelectorAll('li').forEach(li => li.classList.remove('correct', 'incorrect'));

                    if (selectedValue === item.answer) {
                        document.getElementById(`li-${index}-${selectedValue}`).classList.add('correct');
                    } else {
                        document.getElementById(`li-${index}-${selectedValue}`).classList.add('incorrect');
                        // Highlight đáp án đúng
                        const correctValue = item.answer;
                        document.getElementById(`li-${index}-${correctValue}`).classList.add('correct');
                    }
                });
            });
        });

        function submitQuiz() {
            let score = 0;
            questions.forEach((item, index) => {
                const selected = document.querySelector(`input[name="q${index}"]:checked`);
                if (selected && selected.value === item.answer) {
                    score++;
                }
            });
            const percentage = (score / questions.length * 100).toFixed(2);
            document.getElementById('result').innerHTML = `<h2>Kết quả: ${score}/${questions.length} (${percentage}%)</h2>`;
            document.getElementById('result').style.display = 'block';
        }
    </script>
    <div style="margin-top: 12px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    font-size: 9px;
">by tuannv❤️</div>
